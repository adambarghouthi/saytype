name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build .app
        run: bash Scripts/build-app.sh "${{ steps.version.outputs.VERSION }}"

      - name: Build DMG
        run: bash Scripts/build-dmg.sh "${{ steps.version.outputs.VERSION }}"

      - name: Upload DMG
        uses: softprops/action-gh-release@v2
        with:
          files: "SayType-${{ steps.version.outputs.VERSION }}.dmg"
          generate_release_notes: true
